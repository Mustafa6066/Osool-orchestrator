version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: osool
      POSTGRES_PASSWORD: osool_dev_2025
      POSTGRES_DB: osool
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osool"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://osool:osool_dev_2025@postgres:5432/osool
      REDIS_URL: redis://redis:6379
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  orchestrator-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "apps/api/dist/worker.js"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://osool:osool_dev_2025@postgres:5432/osool
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:4000

  # Nightly PostgreSQL backup — dumps to ./backups/ on the host
  pg-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: osool
      PGPASSWORD: osool_dev_2025
      PGDATABASE: osool
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          STAMP=$$(date +%Y%m%d_%H%M%S)
          pg_dump -Fc > /backups/osool_$$STAMP.dump
          # Keep only the 7 most recent backups
          ls -t /backups/osool_*.dump | tail -n +8 | xargs -r rm --
          echo "[pg-backup] $$STAMP done — $$(ls /backups/osool_*.dump | wc -l) backups retained"
          sleep 86400
        done

volumes:
  pgdata:
  redisdata:
